# fwatcher configuration - Linux
# ----------------------------------------------------------------------
# Path absolute yang dipantau. Bisa file atau folder.
paths:
  - "/etc"
  - "/var/www"
  - "/home"

# Pantau seluruh subfolder secara rekursif
# CATATAN: tiap subfolder = 1 inotify watch. Kalau target besar (banyak subfolder),
# naikkan limit kernel:
#   echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf
#   sudo sysctl -p
recursive: true

# File log JSON yang dibaca Wazuh agent via <localfile>
log_path: "/var/log/fwatcher/fwatcher.json"

# Hash SHA256 sebelum/sesudah perubahan
hash_files: true

# Skip hash file lebih besar dari ini (MB)
max_hash_size_mb: 100

# Debounce event burst dari editor/installer dalam milidetik
debounce_ms: 300

# Tampilkan ISI perubahan (unified diff) di log.
# Set 0 untuk matikan — hanya hash yang dicatat.
# File teks ≤ angka KB ini akan disimpan content-nya untuk diff.
# CATATAN: tiap file watched yang ≤ batas ini menempati RAM seukuran filenya.
max_diff_size_kb: 512

# Jumlah baris konteks di unified diff
diff_context_lines: 3

# Batas ukuran field "diff" di JSON log (KB)
max_diff_output_kb: 16

# Coba deteksi PROSES yang sedang membuka file saat event terjadi.
# Linux: scan /proc/*/fd/*. Tanpa root cuma lihat proses sendiri —
# jalankan via systemd (User=root) untuk lihat semua editor.
# Best-effort; atomic-write & short writes sering keburu tutup file.
detect_editor: true

# Pilihan backend FS watcher:
#   auto     → pakai fanotify kalau jalan sebagai root, kalau bukan pakai fsnotify
#   fanotify → paksa fanotify (Linux only, butuh CAP_SYS_ADMIN/root)
#   fsnotify → paksa fsnotify (inotify; tidak butuh root)
#
# fanotify = kernel kirim PID pelaku LANGSUNG saat event (sama sumber datanya
# dengan auditd). editor_pid/editor_user/editor_login_user jadi 100% akurat,
# tidak race seperti scan /proc. Catatan: basic mode fanotify hanya memantau
# tulis (FAN_CLOSE_WRITE), tidak event delete murni — untuk audit hapus
# tetap pakai auditd di sebelahnya.
backend: auto

# Pola yang diabaikan
ignore_patterns:
  - "*.tmp"
  - "*.tmp.*"   # atomic-write tempfiles
  - "*.swp"
  - "*.swx"
  - "*~"
  - ".git"
  - "node_modules"
  - "__pycache__"
  - "*.pyc"
